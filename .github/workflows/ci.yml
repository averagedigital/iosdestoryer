name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ios:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Test AgentCore
        run: swift test

      - name: Build iOS app
        run: xcodebuild -project iOSAgent.xcodeproj -scheme iOSAgent -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO build
